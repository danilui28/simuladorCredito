<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novacredit - Simulador</title>
    <link rel="stylesheet" href="simulador.css">
</head>
<body>

<div class="container">

    <div class="bank-header">
        <div class="logo">
            <div class="logo-mark"></div>
            <span class="logo-text">NOVACREDIT</span>
        </div>
    </div>

    <div class="section-block">
        <h2>Datos financieros</h2>

        <div class="form-group">
            <label for="txtIngresos">Ingresos:</label>
            <input type="number" id="txtIngresos">
        </div>

        <div class="form-group">
            <label for="txtArriendo">Arriendo:</label>
            <input type="number" id="txtArriendo">

            <label for="txtAlimentacion">Alimentacion:</label>
            <input type="number" id="txtAlimentacion">

            <label for="txtVarios">Varios:</label>
            <input type="number" id="txtVarios">
        </div>

         <p>Egresos totales: <span id="spnTotalEgresos"></span></p>
        <p>Disponible: <span id="spnDisponible"></span></p>
        <p>Capacidad de pago mensual: <span id="spnCapacidadPago"></span></p>
    </div>

    <div class="section-block">
        <h2>Solicitud de crédito</h2>

        <div class="form-group">
            <label for="txtMonto">Monto:</label>
            <input type="number" id="txtMonto">
        </div>

        <div class="form-group">
            <label for="txtPlazo">Plazo en años:</label>
            <input type="number" id="txtPlazo">
        </div>

        <div class="form-group">
            <label for="txtTasaInteres">Tasa de interés (%):</label>
            <input type="number" id="txtTasaInteres">
        </div>

        <p>Interés a pagar: <span id="spnInteresPagar"></span></p>
        <p>Total préstamo: <span id="spnTotalPrestamo"></span></p>
        <p>Cuota mensual: <span id="spnCuotaMensual"></span></p>
        <p>Estado de crédito: <span id="spnEstadoCredito">ANALIZANDO...</span></p>
    </div>

    <div class="buttons">
        <button id="btnCalcularCredito" onclick="calcular()">Calcular Crédito</button>
        <button id="btnReiniciar" onclick="location.reload()">Reiniciar</button>
    </div>

</div>

<script src="funciones.js"></script>
<script src="simulador.js"></script>

</body>
</html>
